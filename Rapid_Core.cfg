[include mainsail.cfg]

[include moonraker_obico_macros.cfg]

[include timelapse.cfg]

[exclude_object]

#################################################################################################################
############################################# Motor Control Start ###############################################
#################################################################################################################

# Motor 1
[stepper_x]
step_pin: PA10 #PB0 # (default is triggered high; use ! to indicate triggered low)
dir_pin: !PA14 #PB1
enable_pin: !PA13 #!PC4
microsteps: 32
rotation_distance: 80 # Distance (in mm) that the axis travels with one full rotation of the stepper motor (or final gear if gear_ratio is specified). This parameter must be provided.
full_steps_per_rotation: 400
endstop_pin: ^EBB:PA2 # Input pins may be preceded by ^ to indicate that a hardware pull-up resistor should be enabled for the pin.
position_endstop: -17.5
position_min: -17.5 # Minimum valid distance (in mm) the user may command the stepper to move to.  The default is 0mm.
position_max: 330
homing_speed: 40 # Maximum velocity (in mm/s) of the stepper when homing. The default is 5mm/s.
homing_retract_dist: 15.0 # Distance to backoff (in mm) before homing a second time during homing. Set this to zero to disable the second home. The default is 5mm.
second_homing_speed: 20 # Velocity (in mm/s) of the stepper when performing the second home. The default is homing_speed/2.

[tmc5160 stepper_x]
cs_pin: PD8 #PA6 # The pin corresponding to the TMC5160 chip select line. This pin will be set to low at the start of SPI messages and raised to high after the message completes. This parameter must be provided.
spi_bus: spi2 # If the micro-controller supports multiple SPI busses then one mayn specify the micro-controller bus name here. The default depends on the type of micro-controller.
interpolate: False
run_current: 1.5 # 1.5 # 2.1 # The amount of current (in amps RMS) to configure the driver to use during stepper movement. This parameter must be provided.
hold_current: 1 # The amount of current (in amps RMS) to configure the driver to us when the stepper is not moving. Setting a hold_current is not recommended (see TMC_Drivers.md for details). The default is to not reduce the current.


# Motor 2
[stepper_y]
step_pin: PB12 # (default is triggered high; use ! to indicate triggered low)
dir_pin: !PB11
enable_pin: !PA8
microsteps: 32
rotation_distance: 40 #120.4 #145.95 #53.33 # Distance (in mm) that the axis travels with one full rotation of the stepper motor (or final gear if gear_ratio is specified). This parameter must be provided.
full_steps_per_rotation: 400
endstop_pin: ^PC3 # Input pins may be preceded by ^ to indicate that a hardware pull-up resistor should be enabled for the pin.
position_endstop: 0
position_min: 0 # Minimum valid distance (in mm) the user may command the stepper to move to.  The default is 0mm.
position_max: 303
homing_speed: 40 #50 # Maximum velocity (in mm/s) of the stepper when homing. The default is 5mm/s.
homing_retract_dist: 5.0 # Distance to backoff (in mm) before homing a second time during homing. Set this to zero to disable the second home. The default is 5mm.
second_homing_speed: 20 # Velocity (in mm/s) of the stepper when performing the second home. The default is homing_speed/2.

[tmc5160 stepper_y]
cs_pin: PB2 # The pin corresponding to the TMC5160 chip select line. This pin will be set to low at the start of SPI messages and raised to high after the message completes. This parameter must be provided.
spi_bus: spi2 # If the micro-controller supports multiple SPI busses then one mayn specify the micro-controller bus name here. The default depends on the type of micro-controller.
interpolate: False
run_current:  1.5 # 0.9 #2.1 #2 # The amount of current (in amps RMS) to configure the driver to use during stepper movement. This parameter must be provided.
hold_current: 1 #2 # The amount of current (in amps RMS) to configure the driver to us when the stepper is not moving. Setting a hold_current is not recommended (see TMC_Drivers.md for details). The default is to not reduce the current.


# Motor 3
[stepper_y1]
step_pin: PC6 # (default is triggered high; use ! to indicate triggered low)
dir_pin: PC7
enable_pin: !PA9
microsteps: 32
rotation_distance: 40 #145.95 #53.33 # Distance (in mm) that the axis travels with one full rotation of the stepper motor (or final gear if gear_ratio is specified). This parameter must be provided.
full_steps_per_rotation: 400

[tmc5160 stepper_y1]
cs_pin: PB10 # The pin corresponding to the TMC5160 chip select line. This pin will be set to low at the start of SPI messages and raised to high after the message completes. This parameter must be provided.
spi_bus: spi2 # If the micro-controller supports multiple SPI busses then one mayn specify the micro-controller bus name here. The default depends on the type of micro-controller.
interpolate: False
run_current: 1.5 # 0.9 #2.1 #2 # The amount of current (in amps RMS) to configure the driver to use during stepper movement. This parameter must be provided.
hold_current: 1 #2 # The amount of current (in amps RMS) to configure the driver to us when the stepper is not moving. Setting a hold_current is not recommended (see TMC_Drivers.md for details). The default is to not reduce the current.


# Motor 4
[stepper_z]
step_pin: PB0 #PA10 # (default is triggered high; use ! to indicate triggered low)
dir_pin: !PB1 #PA14
enable_pin:!PC4 #!PA13
microsteps: 32
rotation_distance: 1 # Distance (in mm) that the axis travels with one full rotation of the stepper motor (or final gear if gear_ratio is specified). This parameter must be provided.
full_steps_per_rotation: 400
endstop_pin: probe:z_virtual_endstop #^PG11 # Input pins may be preceded by ^ to indicate that a hardware pull-up resistor should be enabled for the pin.
position_min: -7 # Minimum valid distance (in mm) the user may command the stepper to move to.  The default is 0mm.
position_max: 320
homing_speed: 5.0 # Maximum velocity (in mm/s) of the stepper when homing. The default is 5mm/s.
homing_retract_dist: 5.0 # Distance to backoff (in mm) before homing a second time during homing. Set this to zero to disable the second home. The default is 5mm.
second_homing_speed: 3.0 # Velocity (in mm/s) of the stepper when performing the second home. The default is homing_speed/2.#step_pulse_duration: 0.000003 #   # The minimum time between the step pulse signal edge and the following "unstep" signal edge. This is also used to set the minimum time between a step pulse and a direction change signal. The default is 0.000000100 (100ns) for TMC steppers that are configured in UART or SPI mode, and the default is 0.000002 (which is 2us) for all other steppers.

[tmc5160 stepper_z]
cs_pin: PA6 #PD8 # The pin corresponding to the TMC5160 chip select line. This pin will be set to low at the start of SPI messages and raised to high after the message completes. This parameter must be provided.
spi_bus: spi2 # If the micro-controller supports multiple SPI busses then one mayn specify the micro-controller bus name here. The default depends on the type of micro-controller.
interpolate: False
run_current: 1.5 #2.1 # The amount of current (in amps RMS) to configure the driver to use during stepper movement. This parameter must be provided.
hold_current: 1.5 # The amount of current (in amps RMS) to configure the driver to us when the stepper is not moving. Setting a hold_current is not recommended (see TMC_Drivers.md for details). The default is to not reduce the current.

############################################# Motor Control End #################################################



