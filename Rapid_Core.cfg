[lis2dw]
cs_pin: EBB:PB1
spi_bus:spi2_PB2_PB11_PB10
axes_map: x,z,y

[resonance_tester]
accel_chip: lis2dw
probe_points: 150, 150, 50
max_freq: 120           # Recommended: Stops before sensor noise takes over
#accel_per_hz: 60        # Safe value for NEMA 23 to prevent stalling
#hz_per_sec: 1


[extruder]
step_pin: EBB:PD3
dir_pin: EBB:PD2
enable_pin: !EBB:PB6
microsteps: 16
rotation_distance: 1
gear_ratio: 10:58   
#full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB:PB0
sensor_type: PT1000
pullup_resistor: 2200
sensor_pin: EBB:PA1
min_temp: 5
max_temp: 350 
min_extrude_temp: 180
max_extrude_only_distance: 1000.0
pressure_advance: 0.038
pressure_advance_smooth_time: 0.040   
#control: pid
#pid_Kp: 31.276
#pid_Ki: 8.688
#pid_Kd: 28.149

[tmc2209 extruder]
uart_pin: EBB:PB3
run_current: 0.5
interpolate: false
