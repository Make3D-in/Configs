#################################################################################################################
############################################ Microprobe SENSOR START ############################################
#################################################################################################################

[probe]
pin: ^EBB:PA5 # NOTE FOR V2 users: Set this to ^!PC14 to set the low level trigger 
deactivate_on_each_sample: False
x_offset: 0
y_offset: 17
#z_offset: 2.5  # Will be overridden when you do a PROBE_CALIBRATE
samples: 2
sample_retract_dist: 2.5
samples_tolerance: 0.1
samples_tolerance_retries: 3
speed: 5.0
activate_gcode:
    PROBE_DOWN  # Deploy before probing
deactivate_gcode:
    PROBE_UP  # Retract after probing


[output_pin probe_enable]
pin: EBB:PA4  # Set to the control pin on your board
value: 0


[gcode_macro PROBE_DOWN]
gcode:
    SET_PIN PIN=probe_enable VALUE=1
    G4 P500


[gcode_macro PROBE_UP]
gcode:
    SET_PIN PIN=probe_enable VALUE=0
    G4 P500


[safe_z_home]
home_xy_position: 10, 10 # Choose an X,Y position that is in the center of your bed. For a 300x300 machine that will be 150, 150. Use the same principle to calculate your bed center.
z_hop: 5
z_hop_speed: 12
speed: 100


[bed_mesh]
speed: 150
horizontal_move_z: 2.5
mesh_min: 10, 40
mesh_max: 310, 300
probe_count: 9,9
algorithm: bicubic
adaptive_margin: 10
#fade_start: 1
#fade_end: 10
#fade_target: 0
#scan_overshoot: 10  #uncomment this section if you still have room left over on the X axis for some scan overshoot to product smoother movements and more accurate scanning. Uncommenting this should be fine if you are using a standard voron mount.

########################################### Microprobe SENSOR END ###############################################



#################################################################################################################
############################################ FILAMENT SENSOR START ##############################################
#################################################################################################################

[filament_switch_sensor switch_sensor]
switch_pin: EBB:PA3
pause_on_runout: False  # Disable auto-pause; we'll handle it in the main macro
event_delay: 3.0        # Debounce delay in seconds
debounce_delay: 0.5     # Debounce before triggering events
runout_gcode:
  PAUSE
  M117 Insert new filament

insert_gcode:
  M117 Filament inserted - Ready to resume
 
[filament_motion_sensor encoder_sensor]  
switch_pin: ^!PD3
extruder: extruder  
pause_on_runout: False 
detection_length: 15
event_delay: 10         # ignore short blips (optional)
pause_delay: 2          # delay before PAUSE (optional)
runout_gcode: 
  PAUSE
  M117 Filament encoder runout 
insert_gcode:
  M117 Filament inserted - Ready to resume
  
############################################ FILAMENT SENSOR END  ###############################################



